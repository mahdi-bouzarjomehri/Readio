<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face2Face | تصویر درس</title>
    <style>
        :root {
            --bg: #f5f2eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --accent: #d97706;
            --blue: #1e4b8c;
            --blue-light: #eaf0f9;
            --tag-en-bg: #dbe9fa;
            --tag-fa-bg: #fef3c7;
            --border: #e0d6c2;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Geneva', 'Verdana', sans-serif;
            background: #ede8dd;
            color: var(--text);
            line-height: 1.8;
            direction: ltr;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 780px;
            width: 100%;
            background: var(--card-bg);
            padding: 32px 28px 28px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 2.4em;
            font-weight: 800;
            color: var(--blue);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-align: left;
        }
        .subheading {
            font-size: 1.2em;
            font-weight: 600;
            color: #4b3a22;
            margin-bottom: 12px;
            text-align: left;
        }

        .audio-section {
            margin: 20px 0 24px;
            text-align: center;
        }
        .audio-section .audio-title {
            font-weight: 600;
            color: #1e4b8c;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .image-container {
            text-align: center;
            margin: 24px 0;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .back-link a {
            display: inline-block;
            background: var(--blue);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-link a:hover {
            background: #153e6d;
        }

        @media print {
            body { background: #fff; padding: 0; margin: 0; }
            .page { box-shadow: none; border: 1px solid #ccc; }
            .audio-section { display: none; }
        }
    </style>
</head>
<body>
<div class="page" style="direction:ltr;">

    <!-- هدر -->
    <h1>Face2Face</h1>
    <p class="subheading">Make friends around the world!</p>

    <!-- پخش‌کننده صوتی -->
    <div class="audio-section">
        <div class="audio-title">🔊 Listen to the full text</div>
        <iframe data-testid="embed-iframe" style="border-radius:12px" 
                src="https://open.spotify.com/embed/episode/2bjYGOh6hYqCwbfI8dWQDb?utm_source=generator&si=86899ff4208e44dc" 
                width="100%" height="152" frameBorder="0" allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy"></iframe>
    </div>

    <!-- عکس اصلی (جایگزین متن) -->
    <div class="image-container">
        <img src="https://mahdi-bouzarjomehri.github.io/Readio/image/0001.img" 
             alt="تصویر درس Face2Face">
    </div>

    <!-- لینک برگشت به صفحه متن -->
    <div class="back-link">
        <a href="https://mahdi-bouzarjomehri.github.io/Readio/0001.html">
            📝 برگشت به نسخهٔ متنی
        </a>
    </div>

</div>
</body>
</html>
